<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Space Grotesk', sans-serif;
        }
        
        .auth-container {
            background: white;
            padding: 60px 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
        }
        
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #f0f0f0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 30px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        h1 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.8rem;
        }
        
        p {
            color: #666;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        
        .error {
            background: #fee;
            color: #c00;
            padding: 15px;
            border-radius: 8px;
            display: none;
            margin-top: 20px;
            border: 1px solid #fcc;
        }
        
        .error.show {
            display: block;
        }
        
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
            transition: 0.3s;
            cursor: pointer;
            border: none;
            font-size: 1rem;
        }
        
        .back-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="spinner"></div>
        <h1 id="title">Authenticating...</h1>
        <p id="message">Please wait while we process your Discord login...</p>
        <div class="error" id="error"></div>
        <button class="back-btn" id="backBtn" style="display: none;">Back to Home</button>
    </div>

    <script src="../js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>

    <script>
        /**
         * OAuth Callback Handler
         * 
         * This page handles the OAuth redirect from Discord.
         * Supabase automatically processes the callback and establishes the session.
         * We just need to confirm the session was created and redirect to home.
         */

        async function handleCallback() {
            const errorDiv = document.getElementById('error');
            const title = document.getElementById('title');
            const message = document.getElementById('message');
            const backBtn = document.getElementById('backBtn');

            try {
                // Initialize Supabase client
                const client = getSupabaseClient();
                if (!client) {
                    throw new Error('Failed to initialize authentication service');
                }

                // Check if session was established
                const { data: { session }, error } = await client.auth.getSession();

                if (error) {
                    throw error;
                }

                if (!session) {
                    throw new Error('No session established. Please try logging in again.');
                }

                // Session successful
                console.log('✅ OAuth callback successful');
                console.log('User:', session.user.email);

                // Store that we just authenticated (for UI purposes)
                sessionStorage.setItem('just_authenticated', 'true');

                // Redirect to home
                setTimeout(() => {
                    window.location.href = '/';
                }, 1500);

            } catch (err) {
                console.error('❌ Authentication failed:', err);

                // Show error
                title.textContent = 'Authentication Failed';
                message.textContent = 'There was an issue logging you in. Please try again.';
                errorDiv.textContent = err.message || 'Unknown error occurred';
                errorDiv.classList.add('show');
                backBtn.style.display = 'inline-block';
                backBtn.onclick = () => {
                    window.location.href = '/';
                };

                // Log for debugging
                console.error('Error details:', {
                    message: err.message,
                    stack: err.stack
                });
            }
        }

        // Handle callback on page load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', handleCallback);
        } else {
            handleCallback();
        }
    </script>
</body>
</html>
