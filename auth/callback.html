<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Space Grotesk', sans-serif;
        }
        
        .auth-container {
            background: white;
            padding: 60px 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
        }
        
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #f0f0f0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 30px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        h1 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.8rem;
        }
        
        p {
            color: #666;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        
        .error {
            background: #fee;
            color: #c00;
            padding: 15px;
            border-radius: 8px;
            display: none;
            margin-top: 20px;
            border: 1px solid #fcc;
            font-family: monospace;
            font-size: 0.9rem;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .error.show {
            display: block;
        }
        
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
            transition: 0.3s;
            cursor: pointer;
            border: none;
            font-size: 1rem;
        }
        
        .back-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }
        
        .debug-log {
            margin-top: 30px;
            text-align: left;
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.8rem;
            max-height: 200px;
            overflow-y: auto;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="spinner"></div>
        <h1 id="title">Authenticating...</h1>
        <p id="message">Please wait while we process your Discord login...</p>
        <div class="error" id="error"></div>
        <button class="back-btn" id="backBtn" style="display: none;">Back to Home</button>
        <div class="debug-log" id="debugLog"></div>
    </div>

    <script>
        // Add console logging to page
        const debugLog = document.getElementById('debugLog');
        const logs = [];
        
        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;
        
        function addLog(message, type = 'log') {
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = `[${timestamp}] ${message}`;
            logs.push(logEntry);
            debugLog.innerHTML = logs.map(l => l + '<br>').join('');
            debugLog.scrollTop = debugLog.scrollHeight;
        }
        
        console.log = function(...args) {
            originalLog(...args);
            addLog(args.join(' '), 'log');
        };
        
        console.error = function(...args) {
            originalError(...args);
            addLog('ERROR: ' + args.join(' '), 'error');
        };
        
        console.warn = function(...args) {
            originalWarn(...args);
            addLog('WARN: ' + args.join(' '), 'warn');
        };
    </script>

    <script src="../js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>

    <script>
        /**
         * OAuth Callback Handler
         * 
         * This page handles the OAuth redirect from Discord.
         * Supabase automatically processes the callback and establishes the session.
         * We just need to confirm the session was created and redirect to home.
         */

        async function handleCallback() {
            console.log('=== CALLBACK HANDLER START ===');
            console.log('Current URL:', window.location.href);
            console.log('Hostname:', window.location.hostname);
            console.log('Pathname:', window.location.pathname);
            
            const errorDiv = document.getElementById('error');
            const title = document.getElementById('title');
            const message = document.getElementById('message');
            const backBtn = document.getElementById('backBtn');

            try {
                // Wait for Supabase library
                console.log('Waiting for Supabase library...');
                if (!window.supabase) {
                    console.error('Supabase library not found at window.supabase');
                    console.error('Window keys:', Object.keys(window).filter(k => k.includes('super') || k.includes('supa')));
                    throw new Error('Supabase library did not load');
                }
                console.log('✅ Supabase library available');
                
                // Initialize Supabase client
                console.log('Initializing Supabase client...');
                const client = getSupabaseClient();
                if (!client) {
                    throw new Error('Failed to initialize authentication service');
                }
                console.log('✅ Client initialized');

                // Check if session was established
                console.log('Checking for session...');
                const { data: { session }, error } = await client.auth.getSession();

                if (error) {
                    console.error('Session error:', error);
                    throw error;
                }

                console.log('Session data:', session);

                if (!session) {
                    throw new Error('No session established. Please try logging in again.');
                }

                // Session successful
                console.log('✅ OAuth callback successful');
                console.log('User email:', session.user.email);
                console.log('User metadata:', session.user.user_metadata);

                // Store that we just authenticated (for UI purposes)
                sessionStorage.setItem('just_authenticated', 'true');

                // Update UI
                title.textContent = 'Success!';
                message.textContent = 'You have been logged in. Redirecting...';

                // Redirect to home
                setTimeout(() => {
                    console.log('Redirecting to home...');
                    window.location.href = '/';
                }, 1500);

            } catch (err) {
                console.error('❌ Authentication failed:', err);
                console.error('Error message:', err.message);
                console.error('Error stack:', err.stack);

                // Show error
                title.textContent = 'Authentication Failed';
                message.textContent = 'There was an issue logging you in. Please try again.';
                errorDiv.textContent = err.message || 'Unknown error occurred';
                errorDiv.classList.add('show');
                backBtn.style.display = 'inline-block';
                backBtn.onclick = () => {
                    console.log('User clicked back button');
                    window.location.href = '/';
                };
            }
        }

        // Handle callback on page load
        console.log('[CALLBACK] Page loaded, state:', document.readyState);
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                console.log('[CALLBACK] DOMContentLoaded event fired');
                setTimeout(handleCallback, 500);
            });
        } else {
            console.log('[CALLBACK] Document already loaded, running callback');
            setTimeout(handleCallback, 500);
        }
    </script>
</body>
</html>
